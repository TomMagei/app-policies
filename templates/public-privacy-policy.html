<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{APP_NAME}} プライバシーポリシー</title>
  <meta name="description" content="{{APP_NAME}} のプライバシーポリシー">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f5;
      --text: #1f2933;
      --muted: #667085;
      --line: #d9dee5;
      --surface: #ffffff;
      --accent: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Segoe UI", sans-serif;
      line-height: 1.75;
    }

    main {
      width: min(880px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    article {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(24px, 5vw, 48px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.25;
      letter-spacing: 0;
    }

    h2 {
      margin: 36px 0 12px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 1.25rem;
      line-height: 1.4;
      letter-spacing: 0;
    }

    p, ul {
      margin: 0 0 16px;
    }

    ul {
      padding-left: 1.4em;
    }

    a {
      color: var(--accent);
    }

    .dates {
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <article>
      <h1>プライバシーポリシー</h1>
      <p class="dates">制定日: {{PUBLISHED_DATE}}<br>最終更新日: {{UPDATED_DATE}}</p>

      <!-- MarkdownからHTML化した本文をここに入れる -->
      {{POLICY_BODY_HTML}}
    </article>
  </main>
</body>
</html>
